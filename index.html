<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Angel Webcore Hopper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&family=Silkscreen:wght@400;700&family=Fredoka:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page-wrap">
      <header class="title-wrap">
        <p class="kicker">Webcore Angel Mode</p>
        <h1>Angel Hopper</h1>
      </header>

      <section class="game-shell" aria-label="Sky Hopper game area">
        <div class="hud" aria-live="polite">
          <p>Score <span id="score">0</span></p>
          <p>Best <span id="best-score">0</span></p>
          <p>Boost <span id="boost-timer">-</span></p>
        </div>

        <canvas id="game-canvas" width="210" height="320" aria-label="Flappy style game canvas"></canvas>

        <div class="overlay" id="overlay">
          <h2 id="overlay-title">Tap or Press Space</h2>
          <p id="overlay-text">Float through dreamy portals, collect stars, and boost your speed.</p>
          <button id="start-button" type="button">Start Game</button>
        </div>
      </section>

      <p class="controls">Controls: Space, W, Arrow Up, or Click to flap</p>
    </main>

    <script src="game.js"></script>
  </body>
</html>
